<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Install Script in DeepTask</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 16px;
      padding: 40px 48px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .logo {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 14px;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    p { font-size: 14px; color: #94a3b8; line-height: 1.6; margin-bottom: 24px; }
    .script-name {
      font-size: 13px;
      font-family: "SF Mono", "Fira Code", monospace;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 10px 14px;
      color: #a5b4fc;
      word-break: break-all;
      margin-bottom: 28px;
      text-align: left;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px 28px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }
    .btn:hover { background: #4f46e5; }
    .fallback {
      margin-top: 20px;
      font-size: 12px;
      color: #64748b;
    }
    .fallback a { color: #6366f1; text-decoration: none; }
    .fallback a:hover { text-decoration: underline; }
    .status { font-size: 13px; color: #64748b; margin-top: 16px; min-height: 20px; }
    #error-msg { color: #f87171; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">⚡</div>
    <h1>Install Script in DeepTask</h1>
    <p>You're about to install a community script into your DeepTask Browser sandbox.</p>
    <div class="script-name" id="script-url">Loading…</div>
    <a class="btn" id="open-btn" href="#">Open in DeepTask</a>
    <div class="status" id="status"></div>
    <div class="fallback">
      Don't have DeepTask? <a href="https://github.com/deeptask-browser/deeptask-browser" target="_blank">Download it here</a>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search)
    const scriptUrl = params.get('url')

    const scriptUrlEl = document.getElementById('script-url')
    const openBtn = document.getElementById('open-btn')
    const statusEl = document.getElementById('status')

    if (!scriptUrl) {
      scriptUrlEl.textContent = 'No script URL provided.'
      openBtn.style.display = 'none'
    } else {
      scriptUrlEl.textContent = scriptUrl
      const deeptaskUrl = 'deeptask://tools/install?url=' + encodeURIComponent(scriptUrl)
      openBtn.href = deeptaskUrl

      // Auto-open after a short delay
      setTimeout(() => {
        statusEl.textContent = 'Opening DeepTask…'
        window.location.href = deeptaskUrl
      }, 800)

      openBtn.addEventListener('click', (e) => {
        e.preventDefault()
        statusEl.textContent = 'Opening DeepTask…'
        window.location.href = deeptaskUrl
      })
    }
  </script>
</body>
</html>
