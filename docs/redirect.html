<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Install Script — DeepTask</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      background: #0d0f1a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #13151f;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 44px 52px;
      max-width: 500px;
      width: 100%;
      text-align: center;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }

    .icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      border-radius: 18px;
      margin: 0 auto 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      box-shadow: 0 8px 24px rgba(99,102,241,0.35);
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin-bottom: 10px;
      color: #f1f5f9;
    }

    .subtitle {
      font-size: 14px;
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .script-url-box {
      background: #0d0f1a;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 12px;
      font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
      color: #a5b4fc;
      word-break: break-all;
      text-align: left;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: linear-gradient(135deg, #6366f1, #7c3aed);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 14px 32px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.15s, transform 0.1s;
      width: 100%;
      letter-spacing: -0.1px;
    }
    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:active { transform: scale(0.98); }

    .status {
      margin-top: 16px;
      font-size: 13px;
      color: #475569;
      min-height: 18px;
    }

    .divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.06);
      margin: 28px 0 20px;
    }

    .footer-text {
      font-size: 12px;
      color: #475569;
      line-height: 1.6;
    }

    .footer-text a {
      color: #818cf8;
      text-decoration: none;
    }
    .footer-text a:hover { text-decoration: underline; }

    #error-state {
      display: none;
      color: #f87171;
      font-size: 14px;
      padding: 14px;
      background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.2);
      border-radius: 10px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">⚡</div>
    <h1>Install in DeepTask</h1>
    <p class="subtitle">Click below to open the install dialog in your DeepTask Browser app.</p>

    <div id="error-state">No script URL provided. Please use a valid install link.</div>

    <div class="script-url-box" id="script-url-display">Loading…</div>

    <a class="btn-primary" id="open-btn" href="#">
      Open in DeepTask Browser
    </a>

    <p class="status" id="status-msg"></p>

    <hr class="divider" />

    <p class="footer-text">
      Don't have DeepTask Browser?
      <a href="https://github.com/deeptask-browser/deeptask-browser" target="_blank" rel="noopener">
        Download it here →
      </a>
    </p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search)
    const scriptUrl = params.get('url')

    const displayEl = document.getElementById('script-url-display')
    const openBtn = document.getElementById('open-btn')
    const statusEl = document.getElementById('status-msg')
    const errorEl = document.getElementById('error-state')

    if (!scriptUrl) {
      errorEl.style.display = 'block'
      displayEl.style.display = 'none'
      openBtn.style.display = 'none'
    } else {
      displayEl.textContent = scriptUrl

      const deeptaskUrl = 'deeptask://tools/install?url=' + encodeURIComponent(scriptUrl)
      openBtn.href = deeptaskUrl

      openBtn.addEventListener('click', function (e) {
        e.preventDefault()
        statusEl.textContent = 'Opening DeepTask Browser…'
        window.location.href = deeptaskUrl
      })

      // Auto-open after a short delay
      setTimeout(function () {
        statusEl.textContent = 'Opening DeepTask Browser…'
        window.location.href = deeptaskUrl
      }, 600)
    }
  </script>
</body>
</html>
